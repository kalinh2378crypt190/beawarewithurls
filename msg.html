<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>system</title>

<style>
body{
  background:#000;
  color:#00ff00;
  font-family:monospace;
  font-size:18px;
  padding:40px;
  margin:0;
}

#terminal{
  white-space:pre-line;
  min-height:400px;
}

.cursor{
  display:inline-block;
  width:10px;
  height:20px;
  background:#00ff00;
  margin-left:4px;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

.warning{
  color:#ff0000;
  margin-top:30px;
  font-weight:bold;
  text-align:center;
  animation:pulse .8s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1;}
  50%{opacity:.6;}
}
</style>
</head>

<body>

<div id="terminal"></div><span class="cursor"></span>
<div class="warning" id="warning"></div>

<script>

const terminal = document.getElementById("terminal")
const warning = document.getElementById("warning")

let userIP = "..."
let userCountry = "..."

let lines = [
"> establishing connection...",
"> locating target ip...",
"> [IP: " + userIP + " | País: " + userCountry + "]",
"> scanning network...",
"> scanning open ports...",
"> mapping vulnerabilities...",
"> partial access granted...",
"> accessing personal data...",
"> [!] WARNING: YOUR INFORMATION HAS BEEN LOGGED",
"> nao saia clicando em links aleatorios porra, ta querendo virar pastinha no doxbin?"
]

let line = 0
let char = 0

async function getIPInfo(){
  try{

    const response = await fetch("https://ipwho.is/")
    const data = await response.json()

    if(data.success){
      userIP = data.ip
      userCountry = data.country
    }else{
      userIP = "Unknown"
      userCountry = "Unknown"
    }

    lines[2] = "> [IP: " + userIP + " | País: " + userCountry + "]"

  }catch(e){

    console.log("Erro:", e)
    lines[2] = "> [IP: Unable to fetch | País: Unknown]"

  }
}

function type(){

  if(line >= lines.length){
    warning.textContent = "⚠️ SUA INFORMAÇÃO FOI REGISTRADA ⚠️"
    return
  }

  const current = lines[line]

  if(char < current.length){

    terminal.textContent += current[char]
    char++

    setTimeout(type,40)

  }else{

    terminal.textContent += "\n"
    line++
    char = 0

    setTimeout(type,300)

  }

}

getIPInfo().then(type)

</script>

</body>
</html>
